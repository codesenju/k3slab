---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitea-postgres-data
  labels:
    service: gitea-postgres-data  # This matches the PVC selector
spec:
  capacity:
    storage: 1Gi
  nfs:
    server: 192.168.0.16 # change me
    path: /mnt/nfs/k8s/cnpg/gitea
  accessModes:
    - ReadWriteOnce
  mountOptions:
    - noatime
    - nfsvers=4.2