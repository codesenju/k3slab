---
# Deploy All Addons via Ansible
- name: Deploy Addons
  hosts: k3s-master
  become: yes
  vars:
    k3s_context: default
    argocd_namespace: argocd
  tasks:
    - name: Deploy ArgoCD
      import_playbook: addons/argocd.yaml

    - name: Deploy Longhorn
      import_playbook: addons/longhorn.yaml

    - name: Deploy MetalLB
      import_playbook: addons/metallb.yaml

    - name: Deploy Cert-Manager
      import_playbook: addons/cert-manager.yaml

    - name: Deploy Prometheus & Grafana
      import_playbook: addons/prometheus.yaml

    - name: Deploy Loki
      import_playbook: addons/loki.yaml

    - name: Deploy KEDA
      import_playbook: addons/keda.yaml

    - name: Deploy n8n
      import_playbook: addons/n8n.yaml

    - name: Deploy Portainer
      import_playbook: addons/portainer.yaml

    - name: Deploy Gitea
      import_playbook: addons/gitea.yaml

    - name: Deploy Harbor
      import_playbook: addons/harbor.yaml

    - name: Show summary
      debug:
        msg: |
          ========================================
          All Addons Deployed Successfully!
          ========================================
          
          Access URLs:
          -----------
          ArgoCD:       kubectl port-forward -n argocd svc/argocd-server 8080:80
          Grafana:      kubectl port-forward -n monitoring svc/prometheus-grafana 3000:80
          Prometheus:   kubectl port-forward -n monitoring svc/prometheus-kube-prometheus-stack 9090:9090
          Loki:        kubectl port-forward -n loki svc/loki 3100:3100
          Portainer:   kubectl port-forward -n portainer svc/portainer 9000:9000
          n8n:         kubectl port-forward -n n8n svc/n8n 5678:80
          Gitea:       kubectl port-forward -n gitea svc/gitea-http 3000:3000
          Harbor:      kubectl port-forward -n harbor svc/harbor 8080:80
          
          Storage:     Longhorn (default)
          LB:          MetalLB (192.168.1.100-200)
          
          Check status:
            kubectl get pods -A
