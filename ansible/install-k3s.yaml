---
# k3s Installation Playbook
- name: Install k3s Master
  hosts: k3s-master
  become: yes
  vars:
    k3s_version: v1.34.4+k3s1
    k3s_token: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters') }}"
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Disable swap
      shell: |
        swapoff -a
        sed -i '/swap/d' /etc/fstab
      changed_when: false

    - name: Load required modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Configure sysctl for Kubernetes
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: net.bridge.bridge-nf-call-iptables, value: 1 }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: 1 }
        - { name: net.ipv4.ip_forward, value: 1 }

    - name: Download k3s install script
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0700'

    - name: Install k3s on master
      shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          INSTALL_K3S_EXEC="--write-kubeconfig-mode 644" \
          sh -
      environment:
        K3S_TOKEN: "{{ k3s_token }}"
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      shell: |
        sleep 10
        k3s kubectl get nodes
      register: k3s_status
      until: k3s_status.rc == 0
      retries: 10
      delay: 5
      changed_when: false

    - name: Get k3s node token
      command: cat /var/lib/rancher/k3s/server/agent-node-token
      register: k3s_agent_token
      changed_when: false

    - name: Save agent token for other hosts
      set_fact:
        k3s_agent_token: "{{ k3s_agent_token.stdout }}"
      when: k3s_agent_token.rc == 0

- name: Install k3s Agent
  hosts: k3s-agent
  become: yes
  vars:
    k3s_version: v1.34.4+k3s1
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Disable swap
      shell: |
        swapoff -a
        sed -i '/swap/d' /etc/fstab
      changed_when: false

    - name: Load required modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Configure sysctl
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: net.bridge.bridge-nf-call-iptables, value: 1 }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: 1 }
        - { name: net.ipv4.ip_forward, value: 1 }

    - name: Download k3s install script
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0700'

    - name: Join agent to cluster
      shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          K3S_URL=https://{{ hostvars[groups['k3s-master'][0]]['ansible_host'] }}:6443 \
          K3S_AGENT_TOKEN={{ hostvars[groups['k3s-master'][0]]['k3s_agent_token'] }} \
          sh -
      register: agent_join
      until: agent_join.rc == 0
      retries: 5
      delay: 10
      changed_when: false

- name: Verify Cluster
  hosts: k3s-master
  tasks:
    - name: Check all nodes
      command: k3s kubectl get nodes -o wide
      register: nodes
      changed_when: false

    - name: Show cluster status
      debug:
        var: nodes.stdout
