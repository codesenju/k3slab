---
# Deploy Nginx Ingress
- name: Install Nginx Ingress
  hosts: k3s-master
  become: yes
  vars:
    nginx_version: v1.10.0
  tasks:
    - name: Create ingress-nginx namespace
      shell: k3s kubectl create namespace ingress-nginx || true
      changed_when: false

    - name: Deploy Nginx Ingress
      shell: |
        k3s kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-{{ nginx_version }}/deploy/static/provider/cloud/deploy.yaml
      register: nginx_deploy
      changed_when: "'created' in nginx_deploy.stdout"

    - name: Wait for Nginx Ingress to be ready
      shell: |
        sleep 30
        k3s kubectl get pods -n ingress-nginx -o jsonpath='{.items[*].status.phase}'
      register: nginx_status
      until: "'Running' in nginx_status.stdout"
      retries: 10
      delay: 10
      changed_when: false

    - name: Display info
      debug:
        msg: |
          Nginx Ingress installed!
          
          Note: k3s comes with Traefik by default. Use this if you prefer Nginx.
          
          Example Ingress:
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: myapp
              annotations:
                nginx.ingress.kubernetes.io/rewrite-target: /
            spec:
              ingressClassName: nginx
              rules:
              - host: myapp.example.com
                http:
                  paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: myapp
                        port:
                          number: 80
