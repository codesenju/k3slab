---
# Deploy Loki Log Aggregation
- name: Install Loki
  hosts: k3s-master
  become: yes
  tasks:
    - name: Create loki namespace
      shell: k3s kubectl create namespace loki || true
      changed_when: false

    - name: Add Grafana helm repo
      shell: |
        k3s helm repo add grafana https://grafana.github.io/helm-charts
        k3s helm repo update
      changed_when: false

    - name: Deploy Loki
      shell: |
        k3s helm install loki grafana/loki-stack -n loki \
          --set loki.persistence.enabled=true \
          --set loki.persistence.size=10Gi \
          --set prometheus.enabled=true \
          --set prometheus.server.persistentVolume.size=10Gi
      register: loki_deploy
      changed_when: "'installed' in loki_deploy.stdout"

    - name: Wait for Loki to be ready
      shell: |
        sleep 45
        k3s kubectl get pods -n loki -o jsonpath='{.items[*].status.phase}'
      register: loki_status
      until: "'Running' in loki_status.stdout"
      retries: 10
      delay: 10
      changed_when: false

    - name: Display access info
      debug:
        msg: |
          Loki installed!
          
          Access logs via Grafana:
            kubectl port-forward -n loki svc/prometheus-grafana 3000:80
            
          Grafana credentials:
            admin / admin (change after first login)
          
          Query logs:
            1. Go to Explore in Grafana
            2. Select Loki as data source
            3. Query: {namespace="default"}
