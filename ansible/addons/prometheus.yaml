---
# Deploy Prometheus & Grafana
- name: Install Monitoring Stack
  hosts: k3s-master
  become: yes
  tasks:
    - name: Create monitoring namespace
      shell: k3s kubectl create namespace monitoring || true
      changed_when: false

    - name: Add Prometheus community helm repo
      shell: |
        k3s helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        k3s helm repo update
      changed_when: false

    - name: Deploy kube-prometheus-stack
      shell: |
        k3s helm install prometheus prometheus-community/kube-prometheus-stack \
          -n monitoring \
          --set prometheus.prometheusSpec.retention=15d \
          --set grafana.persistence.enabled=true \
          --set alertmanager.alertmanagerSpec.storage.volumeClaimTemplate.spec.resources.requests.storage=2Gi
      register: prometheus_deploy
      changed_when: "'installed' in prometheus_deploy.stdout"

    - name: Wait for Prometheus to be ready
      shell: |
        sleep 30
        k3s kubectl get pods -n monitoring -l app.kubernetes.io/name=prometheus -o jsonpath='{.items[0].status.phase}'
      register: prometheus_status
      until: prometheus_status.stdout == 'Running'
      retries: 15
      delay: 10
      changed_when: false

    - name: Display access info
      debug:
        msg: |
          Prometheus & Grafana installed!
          
          Access:
            kubectl port-forward -n monitoring svc/prometheus-kube-prometheus-stack 9090:9090
            kubectl port-forward -n monitoring svc/prometheus-grafana 3000:80
            
          Grafana:
            Username: admin
            Password: (check with: kubectl get secret prometheus-grafana -n monitoring -o jsonpath='{.data.admin-password}' | base64 -d)
